<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Agency | Contact</title>
    
    <style>
        /* Basic Resets and Styles */
        body { font-family: sans-serif; margin: 0; line-height: 1.6; }
        .container { width: 80%; margin: auto; padding: 20px; }
        .navbar { background: #333; color: white; padding: 1rem 0; }
        .navbar .container { display: flex; justify-content: space-between; align-items: center; }
        .nav-links { list-style: none; display: flex; }
        .nav-links li { margin-left: 20px; }
        .nav-links a { color: white; text-decoration: none; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; }
        .form-group input, .form-group textarea { width: 100%; padding: 8px; }
        .btn { padding: 10px 20px; background: #333; color: white; border: none; cursor: pointer; }

        /* Green Screen Overlay Styles */
        #successOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #27ae60;
            color: white;
            display: none; /* Hidden by default */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="successOverlay">
        <h1>Congratulations!</h1>
        <p>Your message has been sent. We will get back to you soon!</p>
        <button onclick="closeOverlay()" style="padding: 10px 20px; margin-top: 20px; cursor: pointer; border: none; font-weight: bold;">Close</button>
    </div>

    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <img src="images/logo.png" alt="Creative Agency Logo" width="150">
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <section class="contact-form">
        <div class="container">
            <h1>Get in Touch</h1>
            <form id="contactForm">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn">Send Message</button>
            </form>
        </div>
    </section>

    <script>
        const form = document.getElementById('contactForm');
        const overlay = document.getElementById('successOverlay');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Show the green screen overlay
            overlay.style.display = 'flex';
            
            // Reset the form
            form.reset();
        });

        function closeOverlay() {
            overlay.style.display = 'none';
        }
    </script>
</body>
</html>
