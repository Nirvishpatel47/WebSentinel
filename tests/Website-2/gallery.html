<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Agency | Gallery</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <img src="images/logo.png" alt="Creative Agency Logo" width="150">
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Gallery Hero -->
    <section class="gallery-hero">
        <div class="container">
            <h1>Our Work</h1>
            <p>Explore our portfolio of projects.</p>
        </div>
    </section>

    <!-- Gallery Grid -->
    <section class="gallery-full">
        <div class="container">
            <div class="gallery-grid-full">
                <img src="images/gallery1.jpg" alt="Project 1">
                <img src="images/gallery2.jpg" alt="Project 2">
                <img src="images/gallery3.jpg" alt="Project 3">
                <!-- Broken images for testing -->
                <img src="images/missing2.png" alt="Project 4" id="broken-gallery-1">
                <img src="images/404-image.png" alt="Project 5" id="broken-gallery-2">
                <img src="images/assets/broken.jpg" alt="Project 6" id="broken-gallery-3">
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <img src="images/logo.png" alt="Creative Agency Logo" width="150">
                </div>
                <div class="footer-links">
                    <a href="index.html">Home</a>
                    <a href="about.html">About</a>
                    <a href="gallery.html">Gallery</a>
                    <a href="services.html">Services</a>
                    <a href="contact.html">Contact</a>
                </div>
                <div class="social-icons">
                    <!-- Broken image for testing -->
                    <img src="images/images/fake.webp" alt="Social Icon" id="broken-footer-icon-gallery">
                </div>
            </div>
            <p>&copy; 2026 Creative Agency. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
