<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact - Website-3</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="topbar">
      <div class="brand"><span class="logo" aria-hidden="true">▣</span><span class="brand-name">Website-3</span></div>

      <nav class="nav nav-desktop" aria-label="Primary navigation">
        <ul class="nav-list">
          <li><a class="nav-link" href="index.html">Home</a></li>
          <li><a class="nav-link" href="services.html">Services</a></li>
          <li><a class="nav-link" href="pricing.html">Pricing</a></li>
          <li><a class="nav-link" href="faq.html">FAQ</a></li>
        </ul>
      </nav>

      <div class="nav-mobile">
        <button class="hamburger" type="button" aria-controls="mobileMenu" aria-expanded="false">
          <span class="hamburger-lines" aria-hidden="true"></span>
          <span class="sr-only">Open menu</span>
        </button>
      </div>
    </div>
  </header>

  <aside id="mobileMenu" class="mobile-menu" aria-hidden="true">
    <div class="mobile-menu-inner">
      <div class="mobile-head">
        <div class="brand"><span class="logo" aria-hidden="true">▣</span><span class="brand-name">Website-3</span></div>
        <button class="mobile-close" type="button" aria-label="Close menu">✕</button>
      </div>
      <nav aria-label="Mobile navigation">
        <ul class="mobile-list">
          <li><a href="index.html">Home</a></li>
          <li><a href="services.html">Services</a></li>
          <li><a href="pricing.html">Pricing</a></li>
          <li><a href="faq.html">FAQ</a></li>
        </ul>
      </nav>
    </div>
  </aside>

  <main class="page">
    <section class="page-head">
      <h1>Contact</h1>
      <p class="lead">Form is present for realism; hidden link logic elsewhere.</p>
    </section>

    <section class="card">
      <form class="form" onsubmit="event.preventDefault(); alert('Submitted (demo).');">
        <label class="field">
          <span>Name</span>
          <input type="text" name="name" required />
        </label>
        <label class="field">
          <span>Email</span>
          <input type="email" name="email" required />
        </label>
        <label class="field">
          <span>Message</span>
          <textarea name="message" rows="4" required></textarea>
        </label>
        <button class="btn primary" type="submit">Send</button>
      </form>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
